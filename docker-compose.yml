version: '3.8'

services:
  # Proxy Reverso
  traefik:
    image: "traefik:v2.9"
    container_name: "traefik"
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
    ports:
      - "80:80"
      - "8080:8080"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - "./infra/traefik/traefik.yml:/etc/traefik/traefik.yml:ro"
    networks:
      - lewefy_net

  # Banco de Dados
  database:
    image: postgres:14-alpine
    container_name: lewefy_db
    environment:
      POSTGRES_USER: lewefy_user
      POSTGRES_PASSWORD: 03fH5XjreGWX1GTzmfOGz7hHplS8Rt6x
      POSTGRES_DB: lewefy
    ports:
      - "5432:5432"
    volumes:
      - lewefy_db_data:/var/lib/postgresql/data
    networks:
      - lewefy_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lewefy_user -d lewefy"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # App unificado (Backend + Frontend)
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lewefy_app
    depends_on:
      database:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      RECAPTCHA_SECRET_KEY: ${RECAPTCHA_SECRET_KEY}
      RESEND_API_KEY: ${RESEND_API_KEY}
      MAIL_FROM: ${MAIL_FROM}
      FRONTEND_URL: ${FRONTEND_URL}
      EMAIL_VERIFIER_API_KEY: ${EMAIL_VERIFIER_API_KEY}
      NODE_ENV: production
    networks:
      - lewefy_net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.app.rule=Host(`lewefy.localhost`)"
      - "traefik.http.routers.app.entrypoints=web"
      - "traefik.http.services.app.loadbalancer.server.port=3000"

volumes:
  lewefy_db_data:

networks:
  lewefy_net:
    driver: bridge
